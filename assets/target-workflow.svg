<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">承炘國際貿易有限公司 AI 客戶開發 Agent 自動化流程</title>
  <desc id="desc">活動設定後，系統從授權貿易資料、公司資料與官網蒐集潛客，再研究評分、驗證 Email、產生個人化開發信、寄送、跟進及分類回覆；只有低信心例外與正向商機需要人工介入。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#486581"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#102a43" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #ffffff; }
      .lane { fill: #f8fafc; stroke: #d9e2ec; stroke-width: 1.5; }
      .lane-title { font: 700 19px "Microsoft JhengHei", "Noto Sans TC", sans-serif; fill: #243b53; }
      .node { stroke-width: 2.5; filter: url(#shadow); }
      .source { fill: #f1f5f9; stroke: #64748b; }
      .agent { fill: #e6f2ff; stroke: #1677ff; }
      .rule { fill: #f1ecff; stroke: #6f42c1; }
      .human { fill: #fff3d6; stroke: #d48806; }
      .result { fill: #eaf7e6; stroke: #389e0d; }
      .node-title { font: 700 18px "Microsoft JhengHei", "Noto Sans TC", sans-serif; fill: #102a43; text-anchor: middle; }
      .node-text { font: 500 15px "Microsoft JhengHei", "Noto Sans TC", sans-serif; fill: #243b53; text-anchor: middle; }
      .step-circle { fill: #334e68; }
      .step-no { font: 700 14px Arial, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
      .arrow { fill: none; stroke: #486581; stroke-width: 3; marker-end: url(#arrow); }
      .handoff { font: 700 15px "Microsoft JhengHei", "Noto Sans TC", sans-serif; fill: #6f4200; text-anchor: middle; }
      .note { font: 700 16px "Microsoft JhengHei", "Noto Sans TC", sans-serif; fill: #243b53; text-anchor: middle; }
      .legend { font: 500 14px "Microsoft JhengHei", "Noto Sans TC", sans-serif; fill: #486581; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="520" rx="18"/>
  <rect class="lane" x="18" y="42" width="1164" height="165" rx="16"/>
  <rect class="lane" x="18" y="252" width="1164" height="165" rx="16"/>
  <text class="lane-title" x="36" y="31">① 名單到寄送｜設定一次，正常案件自動放行</text>
  <text class="lane-title" x="36" y="241">② 跟進到商機｜系統自動處理，正向回覆才交給業務（由右往左）</text>

  <!-- Row 1 arrows -->
  <path class="arrow" d="M 224 124 H 263"/>
  <path class="arrow" d="M 460 124 H 499"/>
  <path class="arrow" d="M 696 124 H 735"/>
  <path class="arrow" d="M 932 124 H 971"/>

  <rect class="node human" x="28" y="76" width="196" height="96" rx="13"/>
  <circle class="step-circle" cx="47" cy="94" r="13"/><text class="step-no" x="47" y="94">1</text>
  <text class="node-title" x="126" y="112">活動設定一次</text>
  <text class="node-text" x="126" y="139">ICP／產品知識</text>
  <text class="node-text" x="126" y="160">寄送與停止政策</text>

  <rect class="node source" x="264" y="76" width="196" height="96" rx="13"/>
  <circle class="step-circle" cx="283" cy="94" r="13"/><text class="step-no" x="283" y="94">2</text>
  <text class="node-title" x="362" y="112">蒐集潛客</text>
  <text class="node-text" x="362" y="139">CRM／CSV</text>
  <text class="node-text" x="362" y="160">貿易資料／API／官網</text>

  <rect class="node agent" x="500" y="76" width="196" height="96" rx="13"/>
  <circle class="step-circle" cx="519" cy="94" r="13"/><text class="step-no" x="519" y="94">3</text>
  <text class="node-title" x="598" y="112">A1 潛客研究</text>
  <text class="node-text" x="598" y="139">公司研究、去重</text>
  <text class="node-text" x="598" y="160">ICP 評分與證據</text>

  <rect class="node rule" x="736" y="76" width="196" height="96" rx="13"/>
  <circle class="step-circle" cx="755" cy="94" r="13"/><text class="step-no" x="755" y="94">4</text>
  <text class="node-title" x="834" y="112">自動資格檢查</text>
  <text class="node-text" x="834" y="139">Email 驗證</text>
  <text class="node-text" x="834" y="160">抑制名單與政策</text>

  <rect class="node agent" x="972" y="76" width="196" height="96" rx="13"/>
  <circle class="step-circle" cx="991" cy="94" r="13"/><text class="step-no" x="991" y="94">5</text>
  <text class="node-title" x="1070" y="112">A2 個人化 Email</text>
  <text class="node-text" x="1070" y="139">主旨、內容、CTA</text>
  <text class="node-text" x="1070" y="160">產品事實檢查</text>

  <!-- transition -->
  <path class="arrow" d="M 1070 172 V 284"/>
  <rect x="972" y="211" width="196" height="28" rx="14" fill="#eefbe9" stroke="#389e0d"/>
  <text class="handoff" x="1070" y="230">規則通過即自動寄送</text>

  <!-- Row 2 arrows, right to left -->
  <path class="arrow" d="M 972 334 H 933"/>
  <path class="arrow" d="M 736 334 H 697"/>
  <path class="arrow" d="M 500 334 H 461"/>
  <path class="arrow" d="M 264 334 H 225"/>

  <rect class="node agent" x="972" y="286" width="196" height="96" rx="13"/>
  <circle class="step-circle" cx="991" cy="304" r="13"/><text class="step-no" x="991" y="304">6</text>
  <text class="node-title" x="1070" y="324">A3 自動寄送</text>
  <text class="node-text" x="1070" y="350">排程與冪等</text>
  <text class="node-text" x="1070" y="371">送達／退信監控</text>

  <rect class="node agent" x="736" y="286" width="196" height="96" rx="13"/>
  <circle class="step-circle" cx="755" cy="304" r="13"/><text class="step-no" x="755" y="304">7</text>
  <text class="node-title" x="834" y="324">自動跟進</text>
  <text class="node-text" x="834" y="350">未回覆才寄送</text>
  <text class="node-text" x="834" y="371">最多 2 次</text>

  <rect class="node agent" x="500" y="286" width="196" height="96" rx="13"/>
  <circle class="step-circle" cx="519" cy="304" r="13"/><text class="step-no" x="519" y="304">8</text>
  <text class="node-title" x="598" y="324">A4 回覆分流</text>
  <text class="node-text" x="598" y="350">正向／問題／拒絕</text>
  <text class="node-text" x="598" y="371">退訂／退信／未知</text>

  <rect class="node rule" x="264" y="286" width="196" height="96" rx="13"/>
  <circle class="step-circle" cx="283" cy="304" r="13"/><text class="step-no" x="283" y="304">9</text>
  <text class="node-title" x="362" y="324">自動採取動作</text>
  <text class="node-text" x="362" y="350">停止／延後／回覆</text>
  <text class="node-text" x="362" y="371">或建立商機</text>

  <rect class="node result" x="28" y="286" width="196" height="96" rx="13"/>
  <circle class="step-circle" cx="47" cy="304" r="13"/><text class="step-no" x="47" y="304">10</text>
  <text class="node-title" x="126" y="324">正向商機</text>
  <text class="node-text" x="126" y="350">CRM 建檔與通知</text>
  <text class="node-text" x="126" y="371">業務開始接手</text>

  <rect x="82" y="436" width="1036" height="48" rx="24" fill="#f8fafc" stroke="#bcccdc" stroke-width="1.5"/>
  <text class="note" x="600" y="466">正常名單全程自動｜只有低信心與資料衝突進例外佇列｜正向回覆才由業務接手</text>

  <rect x="410" y="499" width="14" height="14" rx="3" class="agent"/><text class="legend" x="431" y="511">AI Agent</text>
  <rect x="510" y="499" width="14" height="14" rx="3" class="rule"/><text class="legend" x="531" y="511">自動規則</text>
  <rect x="620" y="499" width="14" height="14" rx="3" class="human"/><text class="legend" x="641" y="511">初次設定</text>
  <rect x="730" y="499" width="14" height="14" rx="3" class="result"/><text class="legend" x="751" y="511">業務商機</text>
</svg>
